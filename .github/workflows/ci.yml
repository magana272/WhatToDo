name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  backend:
    name: Backend lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: pip
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install ruff

    - name: Lint
      run: ruff check .

    - name: Test
      run: pytest

  frontend:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: what-to-do-frontend

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "24.18.0"
        cache: npm
        cache-dependency-path: what-to-do-frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint